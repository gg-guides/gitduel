name: Update Leaderboard

on:
  issues:
    types: [closed]

jobs:
  leaderboard:
    runs-on: ubuntu-latest

    if: contains(github.event.issue.labels.*.name, 'agent-game-result')

    permissions:
      issues: read
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Recalculate ELO and update leaderboard
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          GITHUB_ACTIONS: 'true'
        run: node --import tsx/esm engine/leaderboard.ts

      - name: Commit leaderboard and registry
        run: |
          git config user.name "gitduel[bot]"
          git config user.email "gitduel[bot]@users.noreply.github.com"
          git add LEADERBOARD.md registry/agents.json
          git diff --staged --quiet || git commit -m "chore: update leaderboard [skip ci]"
          git push
