name: Validate Open Table

on:
  issues:
    types: [opened]

jobs:
  validate:
    runs-on: ubuntu-latest

    if: startsWith(github.event.issue.title, '[OPEN TABLE]')

    permissions:
      issues: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Apply game:open label
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['game:open']
            })

      - name: Validate open table limit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          COMMENTER: ${{ github.event.issue.user.login }}
          DEALER_ACTION: validate-table
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: node --import tsx/esm engine/dealer.ts
