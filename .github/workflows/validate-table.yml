name: Validate Open Table

on:
  issues:
    types: [opened, labeled]

jobs:
  validate:
    runs-on: ubuntu-latest

    if: contains(github.event.issue.labels.*.name, 'game:open')

    permissions:
      issues: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Validate open table limit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          COMMENTER: ${{ github.event.issue.user.login }}
          DEALER_ACTION: validate-table
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: node --import tsx/esm engine/dealer.ts
